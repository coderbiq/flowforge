schema: flowforge/exploration@v2
description: Directory contract for a durable exploration artifact.
type: object
required:
  - workspace
  - slug
  - title
  - status
  - created_at
  - updated_at
  - question
  - ownership
  - paths
properties:
  workspace:
    type: string
    description: Document workspace that owns the exploration.
  slug:
    type: string
  title:
    type: string
  status:
    type: string
    enum:
      - active
      - validated
      - parked
      - rejected
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
  question:
    type: string
  ownership:
    type: array
    minItems: 1
    description: |
      Ownership tags the exploration expects to flow into proposals.
      Same shape as proposal ownership. See workflow/guides/ownership.md.
    items:
      type: object
      required: [type, target, role]
      properties:
        type:
          type: string
          enum:
            - module
            - system
            - cross-module
            - convention
        target:
          type: string
        role:
          type: string
          enum: [primary, secondary]
  expected_size_class:
    type: string
    enum:
      - small
      - medium
      - large
    description: |
      Predicted size class for the future proposal. Used as the default
      when a proposal is generated from this exploration. May be overridden
      at proposal time. See workflow/guides/sizing.md.
  classification_bucket:
    type: string
    enum:
      - module
      - system
      - cross-module
      - convention
      - decision
      - exploration
  module_name:
    type: string
  needs_review:
    type: boolean
  review_status:
    type: string
    enum:
      - pending
      - reviewed
      - waived
  confidence:
    type: string
    enum:
      - high
      - medium
      - low
  reusable_rules:
    type: array
    description: |
      Candidate convention-level rules surfaced during exploration. Each
      entry should be a short statement that may later be promoted into
      docs/conventions/.
    items:
      type: object
      required: [title]
      properties:
        title:
          type: string
        summary:
          type: string
        target:
          type: string
          description: Optional path hint for the future convention doc.
  paths:
    type: object
    required:
      - index
      - journal_dir
      - findings_dir
      - decisions_dir
      - artifacts_dir
    properties:
      index:
        type: string
      journal_dir:
        type: string
      findings_dir:
        type: string
      decisions_dir:
        type: string
      artifacts_dir:
        type: string
