schema: flowforge/proposal@v2
description: Canonical metadata contract for a FlowForge proposal artifact.
type: object
required:
  - schema_version
  - id
  - slug
  - title
  - status
  - created_at
  - updated_at
  - workspace
  - scope
  - source_explorations
  - owner
  - task_backend
  - archive_targets
  - links
properties:
  schema_version:
    type: string
    enum: ["v2"]
  id:
    type: string
    pattern: "^CR[0-9]{8}$"
    description: Change request id in CRYYMMDDNN format.
  slug:
    type: string
    description: Kebab-case proposal slug.
  title:
    type: string
  status:
    type: string
    enum:
      - draft
      - proposed
      - approved
      - active
      - implemented
      - archived
      - rejected
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
  workspace:
    type: string
    description: Proposal's primary document workspace name.
  scope:
    type: string
    enum:
      - workspace
      - cross-workspace
      - monorepo
  source_explorations:
    type: array
    minItems: 1
    items:
      type: object
      required: [workspace, ref]
      properties:
        workspace:
          type: string
        ref:
          type: string
  canonical_corpus:
    type: array
    items:
      type: object
      required: [workspace, ref, type]
      properties:
        workspace:
          type: string
        ref:
          type: string
        type:
          type: string
          enum: [module, architecture, decision]
        role:
          type: string
          enum: [primary, secondary]
  owner:
    type: string
  task_backend:
    type: string
    enum:
      - beads
      - github
      - linear
      - none
  task_epic_id:
    type: [string, "null"]
  archive_targets:
    type: array
    minItems: 1
    items:
      type: object
      required: [key, type, workspace, ref, role]
      properties:
        key:
          type: string
          description: Stable logical reference for the target.
        type:
          type: string
          enum: [module, architecture, decision]
        workspace:
          type: string
        ref:
          type: string
          description: Path relative to the workspace docs root.
        role:
          type: string
          enum: [primary, secondary]
  tags:
    type: array
    items:
      type: string
  links:
    type: object
    required: [design, task_map, notes]
    properties:
      design:
        type: string
      task_map:
        type: string
      notes:
        type: string
