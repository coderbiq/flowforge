schema: flowforge/proposal@v2
description: Canonical metadata contract for a FlowForge proposal artifact.
type: object
required:
  - schema_version
  - id
  - slug
  - title
  - status
  - created_at
  - updated_at
  - workspace
  - scope
  - size_class
  - ownership
  - source_explorations
  - owner
  - task_backend
  - archive_targets
  - links
properties:
  schema_version:
    type: string
    enum: ["v2"]
  id:
    type: string
    pattern: "^CR[0-9]{8}$"
    description: Change request id in CRYYMMDDNN format.
  slug:
    type: string
    description: Kebab-case proposal slug.
  title:
    type: string
  status:
    type: string
    enum:
      - draft
      - proposed
      - approved
      - active
      - implemented
      - archived
      - rejected
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
  workspace:
    type: string
    description: Proposal's primary document workspace name.
  scope:
    type: string
    enum:
      - workspace
      - cross-workspace
      - monorepo
  size_class:
    type: string
    enum:
      - small
      - medium
      - large
    description: |
      Design surface size declared by the proposal. Determines whether the
      proposal uses a single design.md, an optional split layout, or a
      mandatory design/ + model/ directory layout.
      See workflow/guides/sizing.md.
  ownership:
    type: array
    minItems: 1
    description: |
      Ownership tags that drive archive placement. At least one entry must
      have role: primary. See workflow/guides/ownership.md.
    items:
      type: object
      required: [type, target, role]
      properties:
        type:
          type: string
          enum:
            - module
            - system
            - cross-module
            - convention
        target:
          type: string
          description: Path relative to the workspace docs root.
        role:
          type: string
          enum: [primary, secondary]
  source_explorations:
    type: array
    minItems: 1
    items:
      type: object
      required: [workspace, ref]
      properties:
        workspace:
          type: string
        ref:
          type: string
  canonical_corpus:
    type: array
    items:
      type: object
      required: [workspace, ref, type]
      properties:
        workspace:
          type: string
        ref:
          type: string
        type:
          type: string
          enum: [module, architecture, decision, convention]
        role:
          type: string
          enum: [primary, secondary]
  owner:
    type: string
  task_backend:
    type: string
    enum:
      - beads
      - github
      - linear
      - none
  task_epic_id:
    type: [string, "null"]
  archive_targets:
    type: array
    minItems: 1
    description: |
      Concrete archive destinations. Each archive target should correspond
      to an ownership entry. Type mapping:
      - module       -> docs/modules/<name>/
      - architecture -> docs/architecture/<topic>.md
      - convention   -> docs/conventions/<topic>.md
      - decision     -> docs/decisions/ADR-*.md
    items:
      type: object
      required: [key, type, workspace, ref, role]
      properties:
        key:
          type: string
          description: Stable logical reference for the target.
        type:
          type: string
          enum: [module, architecture, decision, convention]
        workspace:
          type: string
        ref:
          type: string
          description: Path relative to the workspace docs root.
        role:
          type: string
          enum: [primary, secondary]
  tags:
    type: array
    items:
      type: string
  links:
    type: object
    required: [design, task_map, notes]
    description: |
      Link map for the proposal artifacts.
      - For size_class small or medium without directory layout, `design`
        points to `design.md`.
      - For size_class large, and for any proposal that opts into the
        directory layout, `design` points to `design/README.md` and the
        optional `model` link points to `model/README.md`.
    properties:
      design:
        type: string
      task_map:
        type: string
      notes:
        type: string
      model:
        type: string
