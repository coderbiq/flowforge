# InsmateV4 Frontend 项目配置模板

wikiRoot: ff-wiki-fe
srcDirs:
  - src
description: InsmateV4 前端 B2B 模块，React + TypeScript + antd
keywords:
  - frontend
  - react
  - typescript
  - antd
  - insmatev4

rules:
  exploration:
    strategy: |
      React + TypeScript + antd (SPA)，状态管理用自定义 hooks（不用 Redux/MobX），
      antd 通过 foundation/components/ 二次封装，API 统一走 Service + Ajax (BusinessAjax)。
      模块结构: services/ hooks/ utils/ types/ consts/ components/。

      以页面为入口，沿组件树逐层展开：

      1. 页面层 → library/modules/<name>/design/pages/<PageName>.md
         路由路径 + 页面组件 + 子组件列表 + 数据流概览

      2. 组件层 → library/modules/<name>/findings/
         每个组件: Props/State/Effects + 三种 UI 状态(loading/error/empty)

      3. 数据流层 → library/modules/<name>/design/data-flow.md
         API service + 自定义 hooks + 状态管理 + TypeScript 类型

      4. 跨页面通用模式 → library/architecture/

      页面分析完成标准: 路由已记录 + 组件树已画出 + 数据流已追踪 + 三种UI状态已检查

  design:
    naming:
      proposal_id: FCR{YYMMDD}{NN}
    task_rules:
      fields:
        - id
        - title
        - type
        - description
        - deliverable
        - dependencies
    strategy: |
      1. 设计前先参考已有类似页面: configuration/pages/ 下找最近似的作为模板
      2. 设计从路由结构开始: 梳理导航层级 → 识别可复用布局
      3. 组件设计: antd → foundation 封装 → 项目专属组件
      4. 每个新组件处理三种 UI 状态(loading/error/empty)
      5. Props 类型完整定义 (TypeScript interface)

  implement:
    task_states:
      - pending
      - in_progress
      - done
      - blocked
    notes:
      fields:
        - timestamp
        - status
        - summary
    strategy: |
      ## 项目已有工具（实施前必查）

      表格: BaseTable / DraggableBaseTable / EditableTable
      表单: NText / NNumber / NPrice / NPercentage / NSelect / NRadio / NSwitch / NTextArea
      表单特性: 每个 base-form 组件内建 i18n defaultValue 安全处理 → 不会触发 missingKey
      校验: Rules.isEmpty('提示').end() 链式
      弹窗: ModalService.confirm/success/info/error/warning
      页面: DeskPage / Page
      Hooks: useCallbackState / useDelayedAction / useSearchSelect
      请求: class XxxService { static async method() { return Ajax.get/post() } }
      工具: import { MyStringUtils, MyNumberUtils, DateUtils, MyUrlUtils } from '@foundation/utils'

      ## 禁止操作

      - 不要直接 antd Form.create / Form.Item → 会导致 i18n missingKey 风暴和渲染循环，使用 base-form 组件
      - 不要直接 antd Table → 使用 BaseTable 系列
      - 不要直接 axios → 使用 Ajax.get/post
      - 不要引入 Redux/MobX
      - 不要在 foundation 层解决页面级问题 → 页面问题在页面层解决
      - 不要手写校验 → 使用 Rules 链式

      ## 实施约束

      1. 保持代码风格一致: hooks 模式 / 组件拆分粒度 / 命名约定
      2. 每个任务完成后确保 TypeScript 检查通过
      3. 新增组件实现三种 UI 状态
      4. API 调用统一走 service 层 (Ajax)

  archive:
    strategy: |
      优先提取可跨模块复用的组件模式和 hooks;
      模块级知识 → library/modules/<name>/;
      页面设计模式 → library/architecture/;
      antd 使用模式 → library/conventions/。

  feedback:
    strategy: |
      UI 异常或组件行为不符合预期 → 先判断设计缺陷还是实现 bug;
      antd 版本差异/浏览器兼容 → finding 回流到 exploration;
      knowledge 类发现 → 标记后等 archive。

  library:
    requireReview: false
    autoUpdateHistory: true
    strategy: |
      按 scope(system/module)和 type(design/decision/convention)组织;
      同类知识合并而非覆盖，保留历史演进记录。
