# 默认 project 配置
# 每个 project 一个配置文件，由 config.yaml 的 projects[].config 引用

wikiRoot: ff-wiki
srcDirs: []
description: ""
keywords: []

modules: {}
# modules:
#   my-module:
#     path: library/modules/my-module/
#     aliases: []

rules:
  intake:
    steps:
      - id: understand-request
        action: 理解用户的核心诉求和背景上下文
      - id: identify-constraints
        action: 识别技术约束、时间要求、已有系统限制
      - id: determine-scope
        action: 判断变更涉及的范围和影响面

  exploration:
    strategy: |
      优先从 library 中查找已有知识和决策，避免重复探索；
      然后检查当前代码库的相关模块；
      最后才考虑外部资料搜索。

  design:
    naming:
      proposal_id: "CR{YYMMDD}{NN}"
      exploration_slug: "kebab-case"
    task_rules:
      fields:
        - id
        - title
        - description
        - deliverable
        - dependencies
      time_estimate: "2-5 分钟每个任务"

  implement:
    task_states:
      - pending
      - in_progress
      - done
      - blocked
    notes:
      fields:
        - timestamp
        - status
        - summary

  library:
    requireReview: false
    autoUpdateHistory: true
