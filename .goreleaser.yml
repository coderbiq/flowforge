version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: flowforge
    main: ./cmd/flowforge
    binary: flowforge
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X flowforge/internal/version.injected={{.Version}}
      - -X flowforge/internal/version.injectedCommit={{.Commit}}
      - -X flowforge/internal/version.injectedDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: flowforge
    formats: ['tar.gz', 'zip']
    format_overrides:
      - goos: windows
        formats: ['zip']
    name_template: "flowforge-{{ .Os }}-{{ .Arch }}"
    files:
      - assets/**

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: coderbiq
    name: flowforge
  prerelease: auto
  draft: false
