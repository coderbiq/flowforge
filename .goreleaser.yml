version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: flowforge
    main: ./cmd/flowforge
    binary: flowforge
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X flowforge/internal/version.injected={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: flowforge
    formats: ['tar.gz', 'zip']
    format_overrides:
      - goos: windows
        formats: ['zip']
    name_template: "flowforge-{{ .Os }}-{{ .Arch }}"

release:
  github:
    owner: coderbiq
    name: flowforge
  prerelease: auto
  draft: false
